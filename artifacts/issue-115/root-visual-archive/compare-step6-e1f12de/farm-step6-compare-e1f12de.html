<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Step 6 Visual Compare</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
      padding: 16px;
    }
    .title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #93a4bf; margin-bottom: 14px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      max-width: 1000px;
    }
    .card {
      background: #111b2e;
      border: 1px solid #27405f;
      border-radius: 10px;
      padding: 10px;
    }
    .label { font-size: 13px; margin-bottom: 8px; color: #cbd5e1; }
    .frame {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      border: 1px solid #3b82f6;
      position: relative;
      overflow: hidden;
      background: #0f172a;
    }
    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .reference img { object-position: 50% 56%; }
    .current img { object-position: 50% 62%; }

    .dot {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: rgba(239, 68, 68, 0.9);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #fff;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 2px rgba(0,0,0,.25);
    }
    .legend {
      margin-top: 12px;
      max-width: 1000px;
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 6px;
      font-size: 12px;
      color: #c7d2fe;
    }
    .legend div { background: #142038; padding: 6px 8px; border-radius: 6px; border: 1px solid #2f4a71; }
  </style>
</head>
<body>
  <div class="title">Step 6 Final - Side-by-Side Visual Compare</div>
  <div class="subtitle">Same-size square crop, same camera orientation. Anchors marked on both images.</div>

  <div class="grid">
    <div class="card">
      <div class="label">Reference</div>
      <div class="frame reference">
        <img src="../../../../farm-plot-reference.jpg" alt="reference" />
        <span class="dot" style="left:14%; top:17%;">1</span>
        <span class="dot" style="left:56%; top:19%;">2</span>
        <span class="dot" style="left:17%; top:64%;">3</span>
        <span class="dot" style="left:84%; top:64%;">4</span>
        <span class="dot" style="left:50%; top:70%;">5</span>
      </div>
    </div>

    <div class="card">
      <div class="label">Current (commit e1f12de)</div>
      <div class="frame current">
        <img src="farm-step6-final-desktop-e1f12de.png" alt="current" />
        <span class="dot" style="left:14%; top:17%;">1</span>
        <span class="dot" style="left:56%; top:19%;">2</span>
        <span class="dot" style="left:17%; top:64%;">3</span>
        <span class="dot" style="left:84%; top:64%;">4</span>
        <span class="dot" style="left:50%; top:70%;">5</span>
      </div>
    </div>
  </div>

  <div class="legend">
    <div>1: Sun</div>
    <div>2: Main cloud</div>
    <div>3: Left house</div>
    <div>4: Right barn</div>
    <div>5: Plot cluster center</div>
  </div>
</body>
</html>
